<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siri Orb</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      font-family: "Segoe UI", "Noto Sans Georgian", Sylfaen, sans-serif;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(15, 43, 83, 0.82) 0, rgba(7, 21, 45, 0.72) 27%, rgba(3, 8, 18, 0.95) 67%, #020307 100%);
      color: #ffffff;
      font-family: "Segoe UI", "Noto Sans Georgian", Sylfaen, sans-serif;
    }

    body::before {
      position: fixed;
      inset: 50% auto auto 50%;
      width: min(640px, 92vw);
      height: min(640px, 92vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(75, 147, 255, 0.16), rgba(30, 89, 181, 0.07) 42%, transparent 72%);
      content: "";
      pointer-events: none;
      transform: translate(-50%, -56%) scale(1);
      animation: ambient-breathe 2s ease-in-out infinite;
    }

    body.listening::before {
      opacity: 0.9;
      animation: none;
      transform: translate(-50%, -56%) scale(1.04);
    }

    .orb-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(680px, 100vw);
      gap: 0;
      padding: max(42px, calc(35vh - 75px)) 20px 32px;
    }

    .orb {
      --orb-scale: 1;
      --glow-soft: 24px;
      --glow-mid: 54px;
      --glow-wide: 92px;
      --glow-alpha: 0.52;
      --orb-pale: rgba(184, 224, 255, 0.9);
      --orb-mid: rgba(70, 157, 255, 0.74);
      --orb-ring: rgba(41, 91, 255, 0.52);
      --orb-edge: rgba(32, 76, 202, 0.18);
      --glow-mid-color: rgba(105, 183, 255, 0.62);
      --glow-wide-color: rgba(54, 119, 255, 0.48);
      --inset-deep: rgba(18, 73, 215, 0.42);
      position: relative;
      width: 150px;
      height: 150px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      transform: scale(var(--orb-scale));
      animation: breathe 2s ease-in-out infinite;
      transition: filter 360ms ease, transform 360ms ease, opacity 360ms ease;
      will-change: transform, filter;
    }

    .orb:disabled {
      cursor: default;
      opacity: 0.55;
    }

    .orb:focus-visible {
      outline: 1px solid rgba(173, 217, 255, 0.62);
      outline-offset: 10px;
    }

    .orb::before,
    .orb::after {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      content: "";
    }

    .orb::before {
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.95) 0 9%, var(--orb-pale) 18%, var(--orb-mid) 41%, var(--orb-ring) 62%, var(--orb-edge) 100%);
      box-shadow:
        0 0 var(--glow-soft) rgba(255, 255, 255, var(--glow-alpha)),
        0 0 var(--glow-mid) var(--glow-mid-color),
        0 0 var(--glow-wide) var(--glow-wide-color),
        inset 0 0 24px rgba(255, 255, 255, 0.62),
        inset 0 -18px 36px var(--inset-deep);
      transition: background 360ms ease, box-shadow 280ms ease, filter 280ms ease;
    }

    .orb::after {
      inset: -8px;
      opacity: 0;
      background:
        conic-gradient(from 0deg, rgba(255, 255, 255, 0), rgba(171, 219, 255, 0.34), rgba(55, 146, 255, 0.03), rgba(215, 235, 255, 0.28), rgba(255, 255, 255, 0));
      mix-blend-mode: screen;
      -webkit-mask: radial-gradient(circle, transparent 0 68px, #000 72px, #000 82px, transparent 86px);
      mask: radial-gradient(circle, transparent 0 68px, #000 72px, #000 82px, transparent 86px);
      transition: opacity 360ms ease;
    }

    .orb.listening {
      --orb-pale: rgba(218, 252, 255, 0.95);
      --orb-mid: rgba(94, 220, 255, 0.82);
      --orb-ring: rgba(63, 151, 255, 0.58);
      --orb-edge: rgba(40, 111, 219, 0.22);
      --glow-mid-color: rgba(114, 231, 255, 0.7);
      --glow-wide-color: rgba(79, 170, 255, 0.56);
      --inset-deep: rgba(28, 110, 224, 0.46);
      animation: none;
      filter: saturate(1.28) brightness(1.08);
    }

    .orb:hover:not(:disabled) {
      filter: saturate(1.18) brightness(1.08);
    }

    .orb:hover:not(:disabled)::before {
      box-shadow:
        0 0 calc(var(--glow-soft) + 10px) rgba(255, 255, 255, calc(var(--glow-alpha) + 0.08)),
        0 0 calc(var(--glow-mid) + 18px) var(--glow-mid-color),
        0 0 calc(var(--glow-wide) + 28px) var(--glow-wide-color),
        inset 0 0 26px rgba(255, 255, 255, 0.68),
        inset 0 -18px 36px var(--inset-deep);
    }

    .orb:active:not(:disabled) {
      transform: scale(calc(var(--orb-scale) * 0.985));
    }

    .orb.processing::after {
      opacity: 0.56;
      animation: processing-spin 1.35s linear infinite;
    }

    .state-label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 1.5rem;
      margin-top: 18px;
      margin-bottom: 48px;
      color: rgba(232, 244, 255, 0.48);
      font-size: 0.96rem;
      line-height: 1.5;
      text-align: center;
      text-shadow: 0 0 18px rgba(104, 174, 255, 0.22);
      opacity: 1;
      transform: translateY(0);
      transition: opacity 320ms ease, transform 320ms ease;
    }

    body.has-transcript:not(.listening):not(.processing) .state-label {
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
    }

    body.listening .state-label,
    body.processing .state-label {
      color: rgba(231, 251, 255, 0.56);
      text-shadow: 0 0 22px rgba(92, 218, 255, 0.28);
    }

    .state-label.updating {
      opacity: 0.28;
      transform: translateY(3px);
    }

    #transcript {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 640px;
      max-height: 36vh;
      min-height: 1.25rem;
      gap: 4px;
      overflow-y: auto;
      padding: 2px clamp(14px, 4vw, 28px) 8px;
      scrollbar-color: transparent transparent;
      scrollbar-width: none;
      transition: scrollbar-color 180ms ease;
    }

    #transcript:hover {
      scrollbar-color: rgba(77, 111, 151, 0.48) transparent;
      scrollbar-width: thin;
    }

    #transcript::-webkit-scrollbar {
      width: 0;
    }

    #transcript:hover::-webkit-scrollbar {
      width: 5px;
    }

    #transcript::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(77, 111, 151, 0.42);
    }

    .transcript-line {
      width: 100%;
      padding: 0;
      color: rgba(245, 250, 255, 0.94);
      font-size: 19px;
      line-height: 1.7;
      text-align: center;
      text-shadow: 0 0 18px rgba(136, 190, 255, 0.16);
      opacity: 0;
      transform: translateY(8px);
      transform-origin: center bottom;
      transition: opacity 400ms ease-out, transform 400ms ease-out, color 400ms ease-out;
    }

    .transcript-line.visible {
      opacity: var(--line-opacity, 0.94);
      transform: translateY(0) scale(var(--line-scale, 1));
    }

    .controls {
      display: flex;
      gap: 10px;
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: opacity 260ms ease, transform 260ms ease;
    }

    body.has-transcript .controls {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .ghost-button {
      min-width: 96px;
      padding: 8px 13px 9px;
      border: 1px solid rgba(150, 202, 255, 0.18);
      border-radius: 999px;
      background: rgba(8, 24, 50, 0.12);
      color: rgba(232, 244, 255, 0.7);
      cursor: pointer;
      font: inherit;
      font-size: 0.88rem;
      line-height: 1.2;
      transition: border-color 220ms ease, color 220ms ease, box-shadow 220ms ease, background 220ms ease, transform 180ms ease;
    }

    .ghost-button:hover,
    .ghost-button:focus-visible {
      border-color: rgba(166, 216, 255, 0.34);
      background: rgba(29, 70, 125, 0.17);
      color: rgba(248, 252, 255, 0.88);
      box-shadow: 0 0 22px rgba(73, 148, 255, 0.13);
      outline: none;
      transform: translateY(-1px);
    }

    .ghost-button:active {
      transform: translateY(1px);
      box-shadow: 0 0 12px rgba(73, 148, 255, 0.09);
    }

    .status {
      min-height: 1.4rem;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.95rem;
      line-height: 1.4;
      text-align: center;
    }

    .status:empty {
      display: none;
    }

    @keyframes breathe {
      0%,
      100% {
        transform: scale(var(--orb-scale));
      }

      50% {
        transform: scale(calc(var(--orb-scale) * 1.08));
      }
    }

    @keyframes processing-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes ambient-breathe {
      0%,
      100% {
        opacity: 0.76;
        transform: translate(-50%, -56%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -56%) scale(1.08);
      }
    }
  </style>
</head>
<body>
  <main class="orb-wrap" aria-label="Voice transcript">
    <button class="orb" id="orb" type="button" aria-label="Start microphone transcription"></button>
    <div class="state-label" id="stateLabel">დააჭირეთ წრეს დასაწყებად</div>
    <div id="transcript" aria-live="polite"></div>
    <div class="controls" id="controls" aria-label="Transcript controls">
      <button class="ghost-button" id="downloadTranscript" type="button">გადმოწერა</button>
      <button class="ghost-button" id="clearTranscript" type="button">გასუფთავება</button>
    </div>
    <div class="status" id="status" role="status" aria-live="polite"></div>
  </main>

  <script>
    const SILENCE_THRESHOLD = 0.025;
    const SILENCE_MS = 800;
    const MIN_SPEECH_MS = 500;
    const MAX_CHUNK_MS = 12000;
    const CONTEXT_CHARS = 200;
    const VOLUME_LOG_MS = 200;

    const orb = document.getElementById('orb');
    const transcript = document.getElementById('transcript');
    const status = document.getElementById('status');
    const stateLabel = document.getElementById('stateLabel');
    const downloadTranscript = document.getElementById('downloadTranscript');
    const clearTranscript = document.getElementById('clearTranscript');

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;

    let stream = null;
    let audioContext = null;
    let analyser = null;
    let audioData = null;
    let activeChunk = null;
    let animationFrame = null;
    let isListening = false;
    let lastAnalysisAt = 0;
    let lastVolumeLogAt = 0;
    let pendingTranscriptions = 0;
    let recorderMimeType = '';
    let transcriptionContext = '';
    let transcriptEntries = [];
    let stateLabelTimer = null;

    function getSupportedWebmMimeType() {
      if (!window.MediaRecorder) {
        return '';
      }

      const preferredTypes = ['audio/webm;codecs=opus', 'audio/webm'];
      if (!MediaRecorder.isTypeSupported) {
        return 'audio/webm';
      }

      return preferredTypes.find((type) => MediaRecorder.isTypeSupported(type)) || '';
    }

    function setStatus(message) {
      status.textContent = message;
    }

    function setProcessing(isProcessing) {
      orb.classList.toggle('processing', isProcessing);
      document.body.classList.toggle('processing', isProcessing);
      updateStateLabel();
    }

    function updateProcessingState() {
      setProcessing(pendingTranscriptions > 0);
    }

    function updateStateLabel() {
      const nextText = pendingTranscriptions > 0
        ? 'მუშავდება...'
        : isListening
          ? 'გისმენთ...'
          : 'დააჭირეთ წრეს დასაწყებად';

      if (stateLabel.textContent === nextText) {
        return;
      }

      window.clearTimeout(stateLabelTimer);
      stateLabel.classList.add('updating');
      stateLabelTimer = window.setTimeout(() => {
        stateLabel.textContent = nextText;
        stateLabel.classList.remove('updating');
      }, 120);
    }

    function updateTranscriptState() {
      const lines = Array.from(transcript.querySelectorAll('.transcript-line'));
      document.body.classList.toggle('has-transcript', lines.length > 0);
      updateStateLabel();

      lines.forEach((line, index) => {
        const distanceFromNewest = lines.length - 1 - index;
        const opacity = Math.max(0.28, 0.94 - distanceFromNewest * 0.14);
        const scale = Math.max(0.92, 1 - distanceFromNewest * 0.018);

        line.style.setProperty('--line-opacity', opacity.toFixed(2));
        line.style.setProperty('--line-scale', scale.toFixed(3));
      });
    }

    function updateOrbFromVolume(volume) {
      const boost = Math.min(volume * 12, 1);
      const scale = isListening ? 1 + boost * 0.2 : 1;

      orb.style.setProperty('--orb-scale', scale.toFixed(3));
      orb.style.setProperty('--glow-soft', `${24 + boost * 30}px`);
      orb.style.setProperty('--glow-mid', `${54 + boost * 48}px`);
      orb.style.setProperty('--glow-wide', `${92 + boost * 70}px`);
      orb.style.setProperty('--glow-alpha', (0.52 + boost * 0.25).toFixed(2));
    }

    function appendTranscript(text) {
      const line = document.createElement('div');
      line.className = 'transcript-line';
      line.textContent = text;
      transcript.appendChild(line);
      transcriptEntries.push({
        text,
        timestamp: new Date(),
      });
      updateTranscriptionContext(text);
      updateTranscriptState();

      requestAnimationFrame(() => {
        line.classList.add('visible');
        line.scrollIntoView({ block: 'end', behavior: 'smooth' });
      });
    }

    function updateTranscriptionContext(text) {
      transcriptionContext = `${transcriptionContext} ${text}`.trim().slice(-CONTEXT_CHARS);
    }

    function handleFinishedChunk(chunk) {
      if (!chunk.parts.length || chunk.speechMs < MIN_SPEECH_MS) {
        return;
      }

      const audioBlob = new Blob(chunk.parts, { type: recorderMimeType });
      if (!audioBlob.size) {
        return;
      }

      sendChunkForTranscription(audioBlob);
    }

    async function sendChunkForTranscription(audioBlob) {
      pendingTranscriptions += 1;
      updateProcessingState();

      const formData = new FormData();
      formData.append('audio', audioBlob, `speech-${Date.now()}.webm`);
      formData.append('context', transcriptionContext);

      try {
        const response = await fetch('/transcribe', {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || `Transcription failed with status ${response.status}`);
        }

        const result = await response.json();
        const text = (result.text || '').trim();
        if (text) {
          appendTranscript(text);
        }
      } catch (error) {
        console.error('Transcription request failed:', error);
        setStatus('The audio could not be transcribed. Please try again.');
      } finally {
        pendingTranscriptions -= 1;
        updateProcessingState();
      }
    }

    function createRecorderChunk() {
      const recorder = new MediaRecorder(stream, { mimeType: recorderMimeType });
      const chunk = {
        recorder,
        parts: [],
        speechMs: 0,
        sawSpeech: false,
        speechStartedAt: null,
        silentSince: null,
      };

      recorder.addEventListener('dataavailable', (event) => {
        if (event.data && event.data.size > 0) {
          chunk.parts.push(event.data);
        }
      });

      recorder.addEventListener('stop', () => {
        handleFinishedChunk(chunk);
      });

      recorder.start();
      activeChunk = chunk;
    }

    function rotateRecorderChunk() {
      if (!activeChunk || !isListening) {
        return;
      }

      const finishedChunk = activeChunk;
      createRecorderChunk();

      if (finishedChunk.recorder.state !== 'inactive') {
        finishedChunk.recorder.stop();
      }
    }

    function measureVolume() {
      analyser.getByteTimeDomainData(audioData);

      let sum = 0;
      for (let index = 0; index < audioData.length; index += 1) {
        const sample = (audioData[index] - 128) / 128;
        sum += sample * sample;
      }

      return Math.sqrt(sum / audioData.length);
    }

    function analyzeMicrophone(now) {
      if (!isListening || !analyser || !activeChunk) {
        return;
      }

      const deltaMs = lastAnalysisAt ? now - lastAnalysisAt : 0;
      lastAnalysisAt = now;

      const volume = measureVolume();
      updateOrbFromVolume(volume);

      if (now - lastVolumeLogAt >= VOLUME_LOG_MS) {
        console.log('mic volume', volume.toFixed(4), 'threshold', SILENCE_THRESHOLD);
        lastVolumeLogAt = now;
      }

      const chunk = activeChunk;

      if (volume >= SILENCE_THRESHOLD) {
        if (!chunk.sawSpeech) {
          chunk.speechStartedAt = now;
        }

        chunk.speechMs += deltaMs;
        chunk.sawSpeech = true;
        chunk.silentSince = null;
      } else if (chunk.sawSpeech) {
        chunk.silentSince = chunk.silentSince || now;

        if (now - chunk.silentSince >= SILENCE_MS) {
          rotateRecorderChunk();
        }
      }

      if (activeChunk === chunk && chunk.sawSpeech && now - chunk.speechStartedAt >= MAX_CHUNK_MS) {
        rotateRecorderChunk();
      }

      animationFrame = requestAnimationFrame(analyzeMicrophone);
    }

    async function startListening() {
      if (isListening) {
        return;
      }

      recorderMimeType = getSupportedWebmMimeType();
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !AudioContextClass || !recorderMimeType) {
        orb.disabled = true;
        setStatus('This browser cannot record microphone audio in the required WebM format.');
        return;
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContextClass();
        await audioContext.resume();

        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.82;
        audioData = new Uint8Array(analyser.fftSize);
        source.connect(analyser);

        isListening = true;
        lastAnalysisAt = performance.now();
        lastVolumeLogAt = 0;
        orb.classList.add('listening');
        document.body.classList.add('listening');
        orb.setAttribute('aria-label', 'Stop microphone transcription');
        setStatus('');
        updateStateLabel();

        createRecorderChunk();
        animationFrame = requestAnimationFrame(analyzeMicrophone);
      } catch (error) {
        console.error('Microphone setup failed:', error);
        const denied = error.name === 'NotAllowedError' || error.name === 'SecurityError';
        setStatus(denied ? 'Microphone access was denied. Please allow microphone access and try again.' : 'The microphone could not be started. Please try again.');
      }
    }

    async function stopListening() {
      if (!isListening) {
        return;
      }

      isListening = false;
      orb.classList.remove('listening');
      document.body.classList.remove('listening');
      orb.style.setProperty('--orb-scale', '1');
      orb.setAttribute('aria-label', 'Start microphone transcription');
      updateStateLabel();

      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }

      if (activeChunk && activeChunk.recorder.state !== 'inactive') {
        activeChunk.recorder.stop();
      }
      activeChunk = null;

      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }

      if (audioContext) {
        await audioContext.close();
        audioContext = null;
      }

      analyser = null;
      audioData = null;
    }

    orb.addEventListener('click', () => {
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });

    downloadTranscript.addEventListener('click', () => {
      if (!transcriptEntries.length) {
        return;
      }

      const body = transcriptEntries
        .map((entry) => `[${entry.timestamp.toLocaleString()}] ${entry.text}`)
        .join('\n');
      const blob = new Blob([body], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `transcript-${new Date().toISOString().replace(/[:.]/g, '-')}.txt`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    });

    clearTranscript.addEventListener('click', () => {
      transcript.replaceChildren();
      transcriptEntries = [];
      transcriptionContext = '';
      updateTranscriptState();
    });
  </script>
</body>
</html>
